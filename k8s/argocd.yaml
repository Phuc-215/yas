apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: yas-apps
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Phuc-215/yas.git
    targetRevision: HEAD
    path: k8s/values
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true